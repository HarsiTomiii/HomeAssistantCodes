button_card_templates:
  global_vars:
    variables:
      small_icon_card_width: 20px
      small_icon_card_height: 35px
      small_icon_size: 20px
      small_icon_border_radius: 99px
      small_icon_border_style: none
      small_icon_box_shadow: none
      small_icon_background_color: rgba(50,50,50,0.01)
      room_card_border_radius: 30px
      large_icon_color_inactive: rgba(255,255,255,1)
      large_icon_color_active: rgba(255,255,255,1)
      color_active: rgba(255, 193, 27, 1)
      color_inactive: rgba(90, 90, 90, 1)
      color_error: rgba(255, 90, 90, 1)
      color_unavailable: rgba(150, 150, 150, 0.5)
  small_icon_button:
    template: global_vars
    show_name: false
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'on'
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
  window_sensor_button:
    template: global_vars
    show_name: false
    icon: mdi:window-closed-variant
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: 'on'
        icon: mdi:window-open-variant
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
      - value: unknown
        styles:
          icon:
            - color: '[[[ return variables.color_unavailable ]]]'
  light_button:
    template: global_vars
    show_name: false
    icon: mdi:lamp
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: 'on'
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
  speaker_button:
    template: global_vars
    show_name: false
    icon: mdi:speaker
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: 'on'
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
  door_sensor_button:
    template: global_vars
    show_name: false
    icon: mdi:door-closed
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: 'on'
        icon: mdi:door-open
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
      - value: unknown
        styles:
          icon:
            - color: '[[[ return variables.color_unavailable ]]]'
  vacuum_button:
    template: global_vars
    show_name: false
    icon: mdi:robot-vacuum
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: docked
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: error
        styles:
          icon:
            - color: '[[[ return variables.color_error ]]]'
      - value: unavailable
        styles:
          icon:
            - color: '[[[ return variables.color_error ]]]'
  leak_button:
    template: global_vars
    show_name: false
    icon: mdi:water-off-outline
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: 'on'
        icon: mdi:water-alert
        styles:
          icon:
            - color: '[[[ return variables.color_error ]]]'
      - value: unknown
        styles:
          icon:
            - color: '[[[ return variables.color_unavailable ]]]'
  presence_button:
    template: global_vars
    show_name: false
    icon: mdi:motion-sensor
    styles:
      card:
        - width: '[[[ return variables.small_icon_card_width ]]]'
        - height: '[[[ return variables.small_icon_card_height ]]]'
        - border-radius: '[[[ return variables.small_icon_border_radius ]]]'
        - border-style: '[[[ return variables.small_icon_border_style ]]]'
        - box-shadow: '[[[ return variables.small_icon_box_shadow ]]]'
        - background-color: '[[[ return variables.small_icon_background_color ]]]'
      icon:
        - width: '[[[ return variables.small_icon_size ]]]'
    state:
      - value: 'on'
        styles:
          icon:
            - color: '[[[ return variables.color_active ]]]'
      - value: 'off'
        styles:
          icon:
            - color: '[[[ return variables.color_inactive ]]]'
      - value: unknown
        styles:
          icon:
            - color: '[[[ return variables.color_unavailable ]]]'
  room_card:
    template: global_vars
    show_state: true
    custom_fields:
      btn:
        card:
          type: horizontal-stack
          card_mod:
            style: |
              ha-card {
                display: flex;
                justify-content: center;
                align-items: center;
              }
    styles:
      card:
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - border-radius: '[[[ return variables.room_card_border_radius ]]]'
        - padding: 15px 0px 10px 0px
      grid:
        - grid-template-areas: '"i" "n" "s" "btn"'
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto auto auto
      icon:
        - align-self: center
        - width: 30px
        - color: '[[[ return variables.large_icon_color_active ]]]'
      name:
        - font-size: 19px
        - font-weight: 600
        - color: rgba(255,255,255,1)
        - text-align: center
        - align-self: center
      state:
        - min-height: 0px
        - font-size: 15px
        - font-weight: 0
        - color: rgba(150,150,150,1)
        - text-align: center
        - align-self: center
      custom_fields:
        btn:
          - display: flex
          - justify-content: center
          - align-items: center
kiosk_mode:
  mobile_settings:
    hide_header: true
views:
  - title: Home
    icon: mdi:home
    cards: []
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    show_icon: false
                    show_name: false
                    show_state: false
                    custom_fields:
                      time: |
                        [[[
                          return `<div style="font-size:64px;font-weight:600;">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                  <div style="font-size:20px;opacity:0.8;">${new Date().toLocaleDateString([], {weekday:'short', day:'2-digit', month:'short'})}</div>`;
                        ]]]
                    styles:
                      card:
                        - background: none
                        - box-shadow: none
                        - border: none
                      custom_fields:
                        time:
                          - text-align: center
                  - type: custom:weather-card
                    entity: weather.forecast_home
                    details: false
                    forecast: false
                    hourly_forecast: false
                    card_mod:
                      style: |
                        ha-card {
                          background: none;
                          box-shadow: none;
                          border: none;
                        }
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: entity
                    entity: person.tamas_harshegyi
                    use_entity_picture: true
                  - type: entity
                    entity: person.andrejka
                    use_entity_picture: true
                  - type: entity
                    entity: person.sylvester
                    use_entity_picture: true
                  - type: entity
                    entity: sensor.lights_on
                    state:
                      - value: 3
                        icon: mdi:lightbulb
                        styles:
                          icon:
                            - color: rgba(155,0,155,1)
                    tap_action:
                      action: perform-action
                      perform_action: light.turn_off
                      target:
                        entity_id: light.all_lights
                      data: {}
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                entity: input_select.state_machine
                icon: >
                  {% if is_state('input_select.state_machine', 'HomeAwake') %}
                    mdi:home-account
                  {% elif is_state('input_select.state_machine', 'EmptyHouse')
                  %}
                    mdi:home-export-outline
                  {% elif is_state('input_select.state_machine', 'MovieTime') %}
                    mdi:video-vintage
                  {% elif is_state('input_select.state_machine', 'SexyTime') %}
                    mdi:hand-heart
                  {% elif is_state('input_select.state_machine', 'Alarm') %}
                    mdi:alert-octagram
                  {% elif is_state('input_select.state_machine', 'Sleeping') %}
                    mdi:sleep
                  {% else %}
                    mdi:help-circle
                  {% endif %}
                content: '{{ states(''input_select.state_machine'') }}'
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      --chip-background: none;
                      box-shadow: none;
                      border: none;
                    }
              - type: template
                entity: sensor.average_house_temperature
                icon: mdi:thermometer
                content: '{{ states(''sensor.average_house_temperature'') }} °C'
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      --chip-background: none;
                      box-shadow: none;
                      border: none;
                    }
          - type: media-control
            entity: media_player.living_room_tv_3
            visibility:
              - condition: state
                entity: media_player.living_room_tv_3
                state: playing
            card_mod:
              style: |
                ha-card {
                  overflow: hidden;
                  backdrop-filter: blur(20px);
                }
        column_span: 1
      - type: grid
        columns: 2
        cards:
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                template: room_card
                name: Bedroom
                icon: mdi:bed
                tap_action:
                  action: navigate
                  navigation_path: '#bedroom'
                entity: sensor.bedroom_temperature_sensor_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: light_button
                          tap_action:
                            action: toggle
                          entity: light.bedroom_lights
                          icon: mdi:lamp
                        - type: custom:button-card
                          template: speaker_button
                          entity: media_player.bedroom_speaker
                        - type: custom:button-card
                          template: window_sensor_button
                          entity: binary_sensor.bedroom_window_sensor_contact
                        - type: custom:button-card
                          template: presence_button
                          entity: binary_sensor.bedroom_presence_detector_presence
                        - type: custom:button-card
                          template: leak_button
                          entity: binary_sensor.bedroom_bathroom_leak_sensor
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Living Room
                icon: mdi:sofa
                tap_action:
                  action: navigate
                  navigation_path: '#livingroom'
                double_tap_action:
                  action: navigate
                  navigation_path: /dashboard-home/livingroom
                entity: sensor.living_room_temperature_sensor_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: light_button
                          tap_action:
                            action: toggle
                          entity: light.living_room_lights
                        - type: custom:button-card
                          template: door_sensor_button
                          entity: binary_sensor.living_room_door_sensor_contact
                        - type: custom:button-card
                          template: presence_button
                          entity: binary_sensor.living_room_presence_detector_presence
                        - type: custom:button-card
                          template: vacuum_button
                          entity: vacuum.geoffrey
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Office
                icon: mdi:desk
                tap_action:
                  action: navigate
                  navigation_path: '#office'
                entity: sensor.office_temperature_sensor_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: light_button
                          tap_action:
                            action: toggle
                          entity: light.office_lights
                          icon: mdi:desk-lamp
                        - type: custom:button-card
                          template: speaker_button
                          entity: media_player.office_speaker
                        - type: custom:button-card
                          template: window_sensor_button
                          entity: binary_sensor.office_window_sensor_contact
                        - type: custom:button-card
                          template: presence_button
                          entity: binary_sensor.office_presence_detector_presence
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Entree
                icon: mdi:door-closed-lock
                tap_action:
                  action: navigate
                  navigation_path: '#entree'
                entity: binary_sensor.front_door_sensor_contact
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: light_button
                          tap_action:
                            action: toggle
                          entity: light.entree_lights
                        - type: custom:button-card
                          template: door_sensor_button
                          entity: binary_sensor.front_door_sensor_contact
                        - type: custom:button-card
                          template: presence_button
                          entity: event.front_garden_camera_motion_2
                        - type: custom:button-card
                          template: leak_button
                          entity: binary_sensor.bryggers_leak_sensor_1_water_leak
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Guest Room
                icon: mdi:account-multiple
                tap_action:
                  action: navigate
                  navigation_path: '#guestroom'
                entity: sensor.guest_room_temperature_sensor_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: light_button
                          tap_action:
                            action: toggle
                          entity: light.guest_room_lights
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Kitchen
                icon: mdi:silverware-fork-knife
                tap_action:
                  action: navigate
                  navigation_path: '#kitchen'
                entity: sensor.soil_sensor_03_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: speaker_button
                          entity: media_player.kitchen_speaker
                        - type: custom:button-card
                          template: window_sensor_button
                          entity: binary_sensor.kitchen_window_sensor_contact
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
              - type: custom:button-card
                template: room_card
                name: Bathroom
                icon: mdi:shower-head
                tap_action:
                  action: navigate
                  navigation_path: '#bathroom'
                entity: sensor.bathroom_temperature_sensor_temperature
                custom_fields:
                  btn:
                    card:
                      type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          template: speaker_button
                          entity: media_player.bathroom_speaker
                        - type: custom:button-card
                          template: leak_button
                          entity: binary_sensor.bathroom_leak_sensor
                      card_mod:
                        style: |
                          ha-card {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                          }
            columns: 2
        column_span: 1
      - type: grid
        cards:
          - type: heading
            icon: mdi:floor-plan
            heading: Rooms
            heading_style: title
            visibility:
              - condition: screen
                media_query: '(min-width: 1024px) and (max-width: 1279px)'
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#bedroom'
                hide_backdrop: false
                margin_top_mobile: 10px
                bg_blur: 0
                show_header: true
                name: Bedroom
                icon: mdi:bed-king-outline
                show_state: true
                bg_opacity: '100'
                show_last_changed: true
                show_attribute: false
                sub_button:
                  main:
                    - entity: binary_sensor.bedroom_presence_detector_presence
                      show_state: true
                      show_last_changed: true
                  bottom: []
                button_type: name
              - type: horizontal-stack
                cards:
                  - type: custom:apexcharts-card
                    graph_span: 24h
                    header:
                      show: true
                      title: ''
                      show_states: true
                      colorize_states: true
                    yaxis:
                      - id: temp
                        show: false
                      - id: humidity
                        show: false
                    apex_config:
                      xaxis:
                        labels:
                          show: false
                        axisBorder:
                          show: false
                        axisTicks:
                          show: false
                        tooltip:
                          enabled: false
                      chart:
                        height: 100
                      stroke:
                        width: 3
                        curve: smooth
                      grid:
                        show: false
                      legend:
                        show: false
                      tooltip:
                        enabled: true
                    series:
                      - entity: sensor.bedroom_temperature_sensor_temperature
                        yaxis_id: temp
                        name: Temperature
                        type: area
                        color: '#ff8a65'
                        opacity: 0.15
                      - entity: sensor.bedroom_temperature_sensor_humidity
                        yaxis_id: humidity
                        name: Humidity
                        type: area
                        color: '#4fc3f7'
                        opacity: 0.15
              - type: vertical-stack
                cards:
                  - type: heading
                    icon: mdi:lamps
                    heading: Lights
                    heading_style: subtitle
                    badges:
                      - type: entity
                        entity: sensor.bedroom_presence_detector_illuminance
                  - type: custom:mushroom-light-card
                    entity: light.bedroom_lights
                    show_brightness_control: true
                    show_color_control: true
                    show_color_temp_control: true
                    use_light_color: true
                    collapsible_controls: false
                    layout: horizontal
                    fill_container: false
                  - type: custom:rgb-light-card
                    entity: light.bedroom_lights
                    size: 30
                    justify: center
                    colors:
                      - rgb_color:
                          - 255
                          - 255
                          - 255
                        transition: 1
                      - rgb_color:
                          - 255
                          - 193
                          - 141
                        transition: 1
                      - rgb_color:
                          - 255
                          - 136
                          - 13
                        transition: 1
                      - rgb_color:
                          - 205
                          - 0
                          - 255
                        transition: 1
                      - rgb_color:
                          - 255
                          - 0
                          - 0
                        transition: 1
                      - rgb_color:
                          - 0
                          - 255
                          - 0
                        transition: 1
                      - rgb_color:
                          - 0
                          - 0
                          - 255
                        transition: 1
                  - square: false
                    type: grid
                    cards:
                      - type: custom:mushroom-light-card
                        entity: light.philips_hue_indoor_strip_02
                        layout: vertical
                        show_brightness_control: true
                        use_light_color: true
                        show_color_temp_control: false
                        collapsible_controls: true
                        show_color_control: false
                      - type: custom:mushroom-light-card
                        entity: light.philips_hue_indoor_strip_01
                        layout: vertical
                        show_brightness_control: true
                        use_light_color: true
                        show_color_temp_control: false
                        collapsible_controls: true
                    columns: 2
              - type: heading
                icon: mdi:surround-sound
                heading_style: subtitle
                heading: Media
              - type: custom:mini-media-player
                entity: media_player.bedroom_speaker
                group: true
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#livingroom'
                bg_blur: 0
                hide_backdrop: false
                margin_top_mobile: 10px
                bg_opacity: '100'
                show_header: true
                name: Living Room
                icon: mdi:sofa-outline
                show_last_changed: true
                show_attribute: false
                show_state: true
                sub_button:
                  main:
                    - entity: binary_sensor.living_room_presence_detector_presence
                      show_state: true
                      show_last_changed: true
                  bottom: []
                button_type: name
              - type: horizontal-stack
                cards:
                  - type: custom:apexcharts-card
                    graph_span: 24h
                    header:
                      show: true
