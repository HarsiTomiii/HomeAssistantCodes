                bg_blur: 0
                hide_backdrop: false
                margin_top_mobile: 10px
                name: Electricity
                icon: mdi:lightning-bolt-circle
                bg_opacity: '100'
                show_attribute: false
                show_last_changed: false
                show_state: false
                button_type: name
                scrolling_effect: true
                show_header: true
                show_name: true
                sub_button:
                  main: []
                  bottom: []
              - type: custom:apexcharts-card
                apex_config:
                  chart:
                    height: 250px
                all_series_config:
                  unit: ' kr.'
                experimental:
                  color_threshold: true
                header:
                  show: true
                now:
                  show: true
                  label: Now
                graph_span: 2d
                span:
                  start: day
                  offset: '-0h'
                yaxis:
                  - min: 0
                    apex_config:
                      tickAmount: 2
                series:
                  - entity: sensor.energi_data_service
                    header_actions:
                      tap_action:
                        action: navigate
                        navigation_path: /dashboard-controls/energy
                    type: column
                    name: Total price
                    data_generator: >
                      var today = entity.attributes.raw_today.map((start, index)
                      => {
                        return [new Date(start["hour"]).getTime(), entity.attributes.raw_today[index]["price"]];
                      });

                      if (entity.attributes.tomorrow_valid) {
                        var tomorrow = entity.attributes.raw_tomorrow.map((start, index) => {
                          return [new Date(start["hour"]).getTime(), entity.attributes.raw_tomorrow[index]["price"]];
                        });

                        var data = today.concat(tomorrow);
                      } else {
                        var data = today
                      }

                      return data;
                    float_precision: 2
                    color_threshold:
                      - value: 0
                        color: cyan
                      - value: 0.5
                        color: green
                      - value: 1
                        color: orange
                      - value: 1.5
                        color: purple
                      - value: 2.2
                        color: darkred
                    show:
                      legend_value: false
                      extremas: time
              - type: custom:mushroom-template-card
                primary: Electricity price
                secondary: >
                  ⚡ Current: {{ states('sensor.electricity_price_current') |
                  float(0) | round(3) }} kr

                  ⏬ Lowest upcoming: {% set today =
                  state_attr('sensor.energi_data_service', 'today') or [] %}{%
                  set tomorrow = state_attr('sensor.energi_data_service',
                  'tomorrow') or [] %}{{ (today + tomorrow) | map('float')| min
                  | round(3) }} kr

                  🕒 Next cheapest hour: {{
                  states('sensor.electricity_next_cheapest_hour') }}
                multiline_secondary: true
                icon: mdi:lightning-bolt
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-controls/energy
                features_position: bottom
                color: >
                  {% set p = states('sensor.electricity_price_current') |
                  float(0) %} {% if p <= 0.5 %} cyan {% elif p <= 1.0 %} green
                  {% elif p <= 1.5 %} orange {% elif p <= 2.2 %} purple {% else
                  %} red {% endif %}
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 30px;
                      padding: 16px;
                      background: linear-gradient(
                        145deg,
                        rgba(30,30,30,0.95),
                        rgba(0,0,0,0.85)
                      );
                      box-shadow:
                        {% set p = states('sensor.electricity_price_current') | float(0) %}
                        {% if p <= 0.5 %}
                          0 0 18px rgba(0, 255, 255, 1),
                          0 0 30px rgba(0, 255, 255, 1);
                        {% elif p <= 1.0 %}
                          0 0 30px rgba(0, 200, 0, 1);
                        {% elif p <= 1.5 %}
                          0 0 30px rgba(255, 165, 0, 1);
                        {% elif p <= 2.2 %}
                          0 0 30px rgba(160, 32, 240, 1);
                        {% else %}
                          0 0 14px rgba(180, 0, 0, 1);
                        {% endif %}
                    }
                    ha-card * {
                      font-size: 20px !important;
                    }
              - type: markdown
                content: |2
                    ## Luna Last Session
                    {{ states('sensor.luna_charging_history') }}
