blueprint:
  name: Dynamic Light Scene - Just like HUE
  description: Creates a dynamic light scene where each selected light cycles independently through the selected colors, with optional conditions and a final scene.
  domain: automation
  input:
    trigger_boolean:
      name: Trigger Input Boolean
      description: Input boolean that starts/stops the dynamic scene.
      selector:
        entity:
          domain: input_boolean
    
    target_lights:
      name: Target Lights
      description: Lights to control in the dynamic scene
      selector:
        entity:
          domain: light
          multiple: true
    color_1:
      name: Color 1 (XY coordinates)
      default: [0.675, 0.322]
      selector:
        object:
    color_2:
      name: Color 2 (XY coordinates)
      default: [0.214, 0.709]
      selector:
        object:
    color_3:
      name: Color 3 (XY coordinates)
      default: [0.153, 0.048]
      selector:
        object:
    color_4:
      name: Color 4 (XY coordinates, optional)
      default: []
      selector:
        object:
    color_5:
      name: Color 5 (XY coordinates, optional)
      default: []
      selector:
        object:
    color_6:
      name: Color 6 (XY coordinates, optional)
      default: []
      selector:
        object:
    color_7:
      name: Color 7 (XY coordinates, optional)
      default: []
      selector:
        object:

    condition_entity:
      name: Condition Entity (Optional)
      description: An additional condition entity that needs to evaluate to true to run the automation. For example, a state machine state entity
      default: ""
      selector:
        entity:
    condition_state:
      name: Condition State (Optional)
      description: The state in which the condition entity must be in
      default: "on"
      selector:
        text:
    
    transition_time:
      name: Transition Time
      description: The time between color transitions
      default: 4
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: seconds
    
    brightness_level:
      name: Brightness Level
      description: The brightness of the lights
      default: 65
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    
    final_scene:
      name: Final Scene (Optional)
      description: After switching off the trigger input, this is the scene that gets activated
      default: ""
      selector:
        entity:
          domain: scene

alias: !input trigger_boolean
description: Dynamic light scene created from blueprint
triggers:
  - trigger: state
    entity_id: !input trigger_boolean
    from: "off"
    to: "on"
    id: start_scene
  - trigger: state
    entity_id: !input trigger_boolean
    from: "on"
    to: "off"
    id: stop_scene

conditions: []

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: start_scene
          - condition: template
            value_template: >-
              {% if condition_entity == "" %}
                true
              {% else %}
                {{ states(condition_entity) == condition_state }}
              {% endif %}
        sequence:
          - repeat:
              while:
                - condition: state
                  entity_id: !input trigger_boolean
                  state: "on"
              sequence:
                - repeat:
                    for_each: !input target_lights
                    sequence:
                      - variables:
                          random_transition: >-
                            {{ (transition_time - 1 + (range(0, 200) | random) / 100) | round(2) }}
                          available_colors: >-
                            {% set colors = [] %}
                            {% if color_1 | length > 0 %}{% set colors = colors + [color_1] %}{% endif %}
                            {% if color_2 | length > 0 %}{% set colors = colors + [color_2] %}{% endif %}
                            {% if color_3 | length > 0 %}{% set colors = colors + [color_3] %}{% endif %}
                            {% if color_4 | length > 0 %}{% set colors = colors + [color_4] %}{% endif %}
                            {% if color_5 | length > 0 %}{% set colors = colors + [color_5] %}{% endif %}
                            {% if color_6 | length > 0 %}{% set colors = colors + [color_6] %}{% endif %}
                            {% if color_7 | length > 0 %}{% set colors = colors + [color_7] %}{% endif %}
                            {{ colors }}
                      - service: light.turn_on
                        target:
                          entity_id: "{{ repeat.item }}"
                        data:
                          transition: "{{ random_transition }}"
                          xy_color: "{{ available_colors | random }}"
                          brightness_pct: "{{ brightness_level }}"
                - delay:
                    seconds: "{{ transition_time + 1 }}"
      
      - conditions:
          - condition: trigger
            id: stop_scene
          - condition: template
            value_template: "{{ final_scene != '' }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input final_scene
            data:
              transition: 3

variables:
  trigger_boolean: !input trigger_boolean
  target_lights: !input target_lights
  color_1: !input color_1
  color_2: !input color_2
  color_3: !input color_3
  color_4: !input color_4
  color_5: !input color_5
  color_6: !input color_6
  color_7: !input color_7
  condition_entity: !input condition_entity
  condition_state: !input condition_state
  transition_time: !input transition_time
  brightness_level: !input brightness_level
  final_scene: !input final_scene

mode: restart
