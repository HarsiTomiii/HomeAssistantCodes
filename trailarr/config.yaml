name: "Trailarr"
description: "Download and manage trailers for your Radarr and Sonarr libraries"
version: "0.9.3"
slug: "trailarr"
url: "https://github.com/nandyalu/trailarr"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: false
hassio_api: false
ingress: true
ingress_port: 7889
panel_icon: "mdi:movie-play"
panel_title: "Trailarr"
ports:
  7889/tcp: 7889
ports_description:
  7889/tcp: "Trailarr Web UI"
map:
  - media:rw
  - config:rw
options:
  PUID: 1000
  PGID: 1000
  TZ: "Europe/London"
  APP_DATA_DIR: "/config/trailarr"
schema:
  PUID: int
  PGID: int
  TZ: str
  APP_DATA_DIR: str
image: "nandyalu/trailarr"
