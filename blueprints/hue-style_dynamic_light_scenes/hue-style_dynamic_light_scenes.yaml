blueprint:
  name: Dynamic Light Scene - Just like HUE
  description: >
    Creates a dynamic light scene where each selected light cycles
    through the selected colors, with optional conditions and a final scene.

    COLORS:
    - Use the color picker to choose up to 7 colors.
    - Colors 4–7 default to black. Leave them black to exclude them from the cycle.
    - Choose vivid, saturated colors for the best effect.
    - Lights transition along the color wheel perimeter, never through white.

    BEHAVIOR:
    - Each light cycles through colors sequentially, offset from its neighbors,
      creating a wave effect similar to Hue dynamic scenes.
  domain: automation
  input:
    trigger_boolean:
      name: Trigger Input Boolean
      description: Input boolean that starts/stops the dynamic scene.
      selector:
        entity:
          domain: input_boolean

    target_lights:
      name: Target Lights
      description: Lights to control in the dynamic scene.
      selector:
        entity:
          domain: light
          multiple: true

    color_1:
      name: Color 1
      default: [255, 0, 0]
      selector:
        color_rgb:
    color_2:
      name: Color 2
      default: [0, 200, 0]
      selector:
        color_rgb:
    color_3:
      name: Color 3
      default: [0, 0, 255]
      selector:
        color_rgb:
    color_4:
      name: Color 4 (leave black to skip)
      default: [0, 0, 0]
      selector:
        color_rgb:
    color_5:
      name: Color 5 (leave black to skip)
      default: [0, 0, 0]
      selector:
        color_rgb:
    color_6:
      name: Color 6 (leave black to skip)
      default: [0, 0, 0]
      selector:
        color_rgb:
    color_7:
      name: Color 7 (leave black to skip)
      default: [0, 0, 0]
      selector:
        color_rgb:

    condition_entity:
      name: Condition Entity (Optional)
      description: An additional condition entity that must be in the specified state for the scene to run.
      default: ""
      selector:
        entity:
    condition_state:
      name: Condition State (Optional)
      description: The state the condition entity must be in.
      default: "on"
      selector:
        text:

    transition_time:
      name: Transition Time
      description: Duration of each color transition.
      default: 4
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: seconds

    stagger_time:
      name: Stagger Time
      description: Delay between each light starting its transition. Creates a wave effect. Set to 0 to disable.
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.5
          unit_of_measurement: seconds

    final_scene:
      name: Final Scene (Optional)
      description: Scene activated when the trigger boolean turns off.
      default: ""
      selector:
        entity:
          domain: scene

alias: !input trigger_boolean
description: Dynamic light scene created from blueprint
triggers:
  - trigger: state
    entity_id: !input trigger_boolean
    from: "off"
    to: "on"
    id: start_scene
  - trigger: state
    entity_id: !input trigger_boolean
    from: "on"
    to: "off"
    id: stop_scene
  - trigger: homeassistant
    event: start
    id: start_scene

conditions: []

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: start_scene
          - condition: state
            entity_id: !input trigger_boolean
            state: "on"
          - condition: template
            value_template: >-
              {% if condition_entity == "" %}
                true
              {% else %}
                {{ states(condition_entity) == condition_state }}
              {% endif %}
        sequence:
          - repeat:
              while:
                - condition: state
                  entity_id: !input trigger_boolean
                  state: "on"
              sequence:
                - repeat:
                    for_each: !input target_lights
                    sequence:
                      - variables:
                          available_colors: >-
                            {% set colors = [] %}
                            {% if color_1 | max > 0 %}{% set colors = colors + [color_1] %}{% endif %}
                            {% if color_2 | max > 0 %}{% set colors = colors + [color_2] %}{% endif %}
                            {% if color_3 | max > 0 %}{% set colors = colors + [color_3] %}{% endif %}
                            {% if color_4 | max > 0 %}{% set colors = colors + [color_4] %}{% endif %}
                            {% if color_5 | max > 0 %}{% set colors = colors + [color_5] %}{% endif %}
                            {% if color_6 | max > 0 %}{% set colors = colors + [color_6] %}{% endif %}
                            {% if color_7 | max > 0 %}{% set colors = colors + [color_7] %}{% endif %}
                            {{ colors }}
                          cycle_step: "{{ (as_timestamp(now()) / (transition_time + 1)) | int }}"
                          random_transition: >-
                            {{ (transition_time - 1 + (range(0, 200) | random) / 100) | round(2) }}
                      - variables:
                          selected_hs: >-
                            {% set idx = ((cycle_step | int + repeat.index - 1) % (available_colors | length)) | int %}
                            {% set rgb = available_colors[idx] %}
                            {% set r = rgb[0] / 255.0 %}
                            {% set g = rgb[1] / 255.0 %}
                            {% set b = rgb[2] / 255.0 %}
                            {% set cmax = [r, g, b] | max %}
                            {% set cmin = [r, g, b] | min %}
                            {% set delta = cmax - cmin %}
                            {% set ns = namespace(h=0) %}
                            {% if delta > 0 %}
                              {% if cmax == r %}
                                {% set ns.h = (60 * (((g - b) / delta) % 6) + 360) % 360 %}
                              {% elif cmax == g %}
                                {% set ns.h = 60 * ((b - r) / delta + 2) %}
                              {% else %}
                                {% set ns.h = 60 * ((r - g) / delta + 4) %}
                              {% endif %}
                            {% endif %}
                            {% set s = 0 if cmax == 0 else (delta / cmax * 100) %}
                            {{ [ns.h | round(1), s | round(1)] }}
                      - service: light.turn_on
                        target:
                          entity_id: "{{ repeat.item }}"
                        data:
                          transition: "{{ random_transition }}"
                          hs_color: "{{ selected_hs }}"
                      - delay:
                          seconds: "{{ stagger_time }}"
                - delay:
                    seconds: "{{ transition_time + 1 }}"

      - conditions:
          - condition: trigger
            id: stop_scene
          - condition: template
            value_template: "{{ final_scene != '' }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input final_scene
            data:
              transition: 3

variables:
  trigger_boolean: !input trigger_boolean
  target_lights: !input target_lights
  color_1: !input color_1
  color_2: !input color_2
  color_3: !input color_3
  color_4: !input color_4
  color_5: !input color_5
  color_6: !input color_6
  color_7: !input color_7
  condition_entity: !input condition_entity
  condition_state: !input condition_state
  transition_time: !input transition_time
  stagger_time: !input stagger_time
  final_scene: !input final_scene

mode: restart
