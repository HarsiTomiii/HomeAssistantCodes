blueprint:
  name: Dynamic Light Scene - Just like HUE
  description: Creates a dynamic light scene where each selected light cycles independently through the selected colors, with optional conditions and a final scene.
  domain: automation
  input:
    trigger_boolean:
      name: Trigger Input Boolean
      description: Input boolean that starts/stops the dynamic scene.
      selector:
        entity:
          domain: input_boolean
    
    target_lights:
      name: Target Lights
      description: Lights to control in the dynamic scene
      selector:
        entity:
          domain: light
          multiple: true
    
    color_1:
      name: Color 1
      default: [255, 102, 102]
      selector:
        color_rgb:
    color_2:
      name: Color 2
      default: [102, 255, 102]
      selector:
        color_rgb:
    color_3:
      name: Color 3
      default: [102, 102, 255]
      selector:
        color_rgb:
    color_4:
      name: Color 4
      default: []
      selector:
        color_rgb:
    color_5:
      name: Color 5
      default: []
      selector:
        color_rgb:
    color_6:
      name: Color 6
      default: []
      selector:
        color_rgb:
    color_7:
      name: Color 7
      default: []
      selector:
        color_rgb:

    condition_entity:
      name: Condition Entity (Optional)
      description: An additional condition entity that needs to evaluate to true to run the automation. For example, a state machine state entity
      default: ""
      selector:
        entity:
    condition_state:
      name: Condition State (Optional)
      description: The state in which the condition entity must be in
      default: "on"
      selector:
        text:
    
    transition_time:
      name: Transition Time
      description: The time between color transitions
      default: 4
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: seconds
    
    brightness_level:
      name: Brightness Level
      description: The brightness of the lights
      default: 65
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    
    final_scene:
      name: Final Scene (Optional)
      description: After switching off the trigger input, this is the scene that gets activated
      default: ""
      selector:
        entity:
          domain: scene

alias: !input trigger_boolean
description: Dynamic light scene created from blueprint
triggers:
  - trigger: state
    entity_id: !input trigger_boolean
    from: "off"
    to: "on"
    id: start_scene
  - trigger: state
    entity_id: !input trigger_boolean
    from: "on"
    to: "off"
    id: stop_scene

conditions: []

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: start_scene
          - condition: template
            value_template: >-
              {% if condition_entity == "" %}
                true
              {% else %}
                {{ states(condition_entity) == condition_state }}
              {% endif %}
        sequence:
          - repeat:
              while:
                - condition: state
                  entity_id: !input trigger_boolean
                  state: "on"
              sequence:
                - repeat:
                    for_each: !input target_lights
                    sequence:
                      - variables:
                          random_transition: >-
                            {{ (transition_time - 1 + (range(0, 200) | random) / 100) | round(2) }}
                          available_colors: >-
                            {% set colors = [] %}
                            {%- macro rgb_to_xy(r, g, b) -%}
                              {%- set r = r / 255.0 -%}
                              {%- set g = g / 255.0 -%}
                              {%- set b = b / 255.0 -%}
                              {%- if r > 0.04045 -%}
                                {%- set r = ((r + 0.055) / 1.055) ** 2.4 -%}
                              {%- else -%}
                                {%- set r = r / 12.92 -%}
                              {%- endif -%}
                              {%- if g > 0.04045 -%}
                                {%- set g = ((g + 0.055) / 1.055) ** 2.4 -%}
                              {%- else -%}
                                {%- set g = g / 12.92 -%}
                              {%- endif -%}
                              {%- if b > 0.04045 -%}
                                {%- set b = ((b + 0.055) / 1.055) ** 2.4 -%}
                              {%- else -%}
                                {%- set b = b / 12.92 -%}
                              {%- endif -%}
                              {%- set X = r * 0.4124 + g * 0.3576 + b * 0.1805 -%}
                              {%- set Y = r * 0.2126 + g * 0.7152 + b * 0.0722 -%}
                              {%- set Z = r * 0.0193 + g * 0.1192 + b * 0.9505 -%}
                              {%- set sum_xyz = X + Y + Z -%}
                              {%- if sum_xyz == 0 -%}
                                [0.3127, 0.3290]
                              {%- else -%}
                                [{{ (X / sum_xyz) | round(4) }}, {{ (Y / sum_xyz) | round(4) }}]
                              {%- endif -%}
                            {%- endmacro -%}
                            {% if color_1 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_1[0], color_1[1], color_1[2])] %}{% endif %}
                            {% if color_2 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_2[0], color_2[1], color_2[2])] %}{% endif %}
                            {% if color_3 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_3[0], color_3[1], color_3[2])] %}{% endif %}
                            {% if color_4 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_4[0], color_4[1], color_4[2])] %}{% endif %}
                            {% if color_5 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_5[0], color_5[1], color_5[2])] %}{% endif %}
                            {% if color_6 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_6[0], color_6[1], color_6[2])] %}{% endif %}
                            {% if color_7 | length > 0 %}{% set colors = colors + [rgb_to_xy(color_7[0], color_7[1], color_7[2])] %}{% endif %}
                            {{ colors }}
                      - service: light.turn_on
                        target:
                          entity_id: "{{ repeat.item }}"
                        data:
                          transition: "{{ random_transition }}"
                          xy_color: "{{ available_colors | random }}"
                          brightness_pct: "{{ brightness_level }}"
                - delay:
                    seconds: "{{ transition_time + 1 }}"
      
      - conditions:
          - condition: trigger
            id: stop_scene
          - condition: template
            value_template: "{{ final_scene != '' }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input final_scene
            data:
              transition: 3

variables:
  trigger_boolean: !input trigger_boolean
  target_lights: !input target_lights
  color_1: !input color_1
  color_2: !input color_2
  color_3: !input color_3
  color_4: !input color_4
  color_5: !input color_5
  color_6: !input color_6
  color_7: !input color_7
  condition_entity: !input condition_entity
  condition_state: !input condition_state
  transition_time: !input transition_time
  brightness_level: !input brightness_level
  final_scene: !input final_scene

mode: restart