name: Update Trailarr Version

on:
  schedule:
    - cron: "0 4 * * *"  # Runs daily at 04:00 UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # <-- required for pushing commit


jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get latest Trailarr release version
        id: trailarr
        run: |
          LATEST=$(curl -s https://api.github.com/repos/nandyalu/trailarr/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest Trailarr version: $LATEST"

      - name: Get current addon version
        id: current
        run: |
          CURRENT=$(grep '^version:' trailarr/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current addon version: $CURRENT"

      - name: Update config.yaml if version changed
        if: steps.trailarr.outputs.version != steps.current.outputs.version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.trailarr.outputs.version }}\"/" trailarr/config.yaml
          echo "Updated config.yaml to version ${{ steps.trailarr.outputs.version }}"

      - name: Commit and push update
        if: steps.trailarr.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trailarr/config.yaml
          git commit -m "chore: update Trailarr addon to v${{ steps.trailarr.outputs.version }}"
          git push
